name: Sauvegarde base (hebdomadaire)

on:
  schedule:
    - cron: '0 3 * * 0'   # chaque dimanche à 03:00 UTC
  workflow_dispatch: {}

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer pg_dump (client PostgreSQL 17)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
      - name: Exporter la base (pg_dump + gzip)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges | gzip -9 > backup.sql.gz
          ls -lh backup.sql.gz
      - name: Envoyer la sauvegarde par e-mail
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          REPORT_FROM: ${{ secrets.REPORT_FROM }}
        run: node agents/backup/send-backup.mjs backup.sql.gz
